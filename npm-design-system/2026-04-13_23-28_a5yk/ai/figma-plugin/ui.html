<!DOCTYPE html>
<html>
<head>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Inter, sans-serif;
      font-size: 13px;
      color: #1a1a1a;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .status { line-height: 1.5; }
    .status.success { color: #1a8a3a; font-weight: 600; }
    .status.error   { color: #c72020; }
    .hint { color: #555; font-size: 12px; }
    code {
      background: #f0f0f0;
      border-radius: 3px;
      padding: 1px 5px;
      font-family: monospace;
    }
    #fallback { display: none; flex-direction: column; gap: 8px; }
    #fallback textarea {
      width: 100%;
      height: 160px;
      font-family: monospace;
      font-size: 11px;
      resize: vertical;
      border: 1px solid #ddd;
      border-radius: 4px;
      padding: 8px;
    }
    #fallback button {
      align-self: flex-start;
      font-size: 12px;
      padding: 4px 10px;
      cursor: pointer;
      border: 1px solid #bbb;
      border-radius: 4px;
      background: #f5f5f5;
    }
    #fallback button:hover { background: #e8e8e8; }
  </style>
</head>
<body>
  <p class="status" id="status">Exporting selection…</p>
  <p class="hint" id="hint"></p>
  <div id="fallback">
    <textarea id="json-output" readonly></textarea>
    <button id="select-btn">Select all</button>
  </div>

  <script>
    const status    = document.getElementById('status');
    const hint      = document.getElementById('hint');
    const fallback  = document.getElementById('fallback');
    const jsonOutput = document.getElementById('json-output');
    const selectBtn = document.getElementById('select-btn');

    selectBtn.addEventListener('click', () => {
      jsonOutput.select();
    });

    function showFallback(json) {
      jsonOutput.value = json;
      fallback.style.display = 'flex';
      parent.postMessage({ pluginMessage: { type: 'resize', height: 380 } }, '*');
    }

    function copyText(text) {
      if (navigator.clipboard && navigator.clipboard.writeText) {
        return navigator.clipboard.writeText(text);
      }
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.style.cssText = 'position:fixed;opacity:0;top:0;left:0';
      document.body.appendChild(ta);
      ta.focus();
      ta.select();
      const ok = document.execCommand('copy');
      document.body.removeChild(ta);
      return ok ? Promise.resolve() : Promise.reject(new Error('execCommand copy failed'));
    }

    window.onmessage = async event => {
      const msg = event.data.pluginMessage;

      if (msg.type === 'ready') {
        try {
          await copyText(msg.json);
          status.textContent = '✅ Copied to clipboard!';
          status.className = 'status success';
          hint.innerHTML = 'Paste as <code>figma-export.json</code> in your project root, then run <code>/ds-figma</code>.';
          parent.postMessage({ pluginMessage: { type: 'done' } }, '*');
        } catch (e) {
          status.textContent = '⚠️ Clipboard unavailable — copy manually:';
          status.className = 'status error';
          hint.innerHTML = 'Select all, copy, then paste as <code>figma-export.json</code> in your project root.';
          showFallback(msg.json);
          parent.postMessage({ pluginMessage: { type: 'clipboard-error', message: e.message } }, '*');
        }
      }

      if (msg.type === 'error') {
        status.textContent = '❌ ' + msg.message;
        status.className = 'status error';
      }
    };
  </script>
</body>
</html>
